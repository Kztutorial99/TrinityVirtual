name: Build TrinityVirtual APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout TrinityVirtual
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK via sdkmanager
        run: |
          sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1" 2>&1 | tail -5
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.p12
          echo "KEYSTORE_FILE=keystore.p12" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build & Sign Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build & Sign Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_FILE: keystore.p12
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify APK Signature
        run: |
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          echo "=== Debug APK ===" && $BUILD_TOOLS/apksigner verify --verbose app/build/outputs/apk/debug/*.apk | head -5
          echo "=== Release APK ===" && $BUILD_TOOLS/apksigner verify --verbose app/build/outputs/apk/release/*.apk | head -5

      - name: Upload Signed Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TrinityVirtual-debug-signed-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: TrinityVirtual-release-signed-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: TrinityVirtual ${{ github.ref_name }}
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          body: |
            ## TrinityVirtual ${{ github.ref_name }}
            ✅ Signed Release APK — ready to install!
            ### Features
            - Virtual Android Environment (Hybrid Container + Root Layer)
            - Virtual Root (fake su via namespace isolation)
            - Device Spoof (Manufacturer, Model, Fingerprint, IMEI, Android ID)
            - GPS Spoof & Module Manager
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
