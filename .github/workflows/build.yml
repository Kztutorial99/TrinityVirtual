name: Build TrinityVirtual APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug + Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout TrinityVirtual
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK via sdkmanager
        run: |
          sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1" 2>&1 | tail -5
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TrinityVirtual-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace
        continue-on-error: true

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: TrinityVirtual-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: TrinityVirtual ${{ github.ref_name }}
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          body: |
            ## TrinityVirtual ${{ github.ref_name }}
            ### Features
            - Virtual Android Environment (Hybrid Container + Root Layer)
            - Virtual Root (fake su via namespace isolation)
            - Device Spoof (Manufacturer, Model, Fingerprint, IMEI, Android ID)
            - GPS Spoof
            - Module Manager (Xposed/Hook/Spoof/System modules)
            - APK installer into virtual space
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
