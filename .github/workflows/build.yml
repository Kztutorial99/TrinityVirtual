name: Build TrinityVirtual APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone VirtualApp Source
        run: git clone --depth=1 https://github.com/asLody/VirtualApp.git source

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle execute permission
        run: chmod +x source/VirtualApp/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles("source/**/*.gradle*") }}
          restore-keys: gradle-

      - name: Build Debug APK
        working-directory: source/VirtualApp
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TrinityVirtual-debug-${{ github.run_number }}
          path: source/VirtualApp/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        working-directory: source/VirtualApp
        run: ./gradlew assembleRelease --stacktrace
        continue-on-error: true

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: TrinityVirtual-release-${{ github.run_number }}
          path: source/VirtualApp/app/build/outputs/apk/release/*.apk
          retention-days: 30
